services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quicklog
    ports:
      - "5432:5432"
    volumes:
      - quicklog_pg_data:/var/lib/postgresql/data

volumes:
  quicklog_pg_data:
